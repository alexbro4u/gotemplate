services:
  postgres-test:
    image: postgres:16-alpine
    container_name: gotemplate-postgres-test
    environment:
      POSTGRES_USER: gotemplate_test
      POSTGRES_PASSWORD: gotemplate_test
      POSTGRES_DB: gotemplate_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotemplate_test"]
      interval: 2s
      timeout: 5s
      retries: 10
